<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DiscovAI Search · agendo test console</title>
    <style>
      :root {
        --bg: #0b0e14;
        --panel: #151a23;
        --panel-2: #1c222d;
        --border: #2a313d;
        --text: #e6e9ef;
        --muted: #97a0b0;
        --accent: #6ea8fe;
        --accent-2: #3b82f6;
        --ok: #4ade80;
        --err: #f87171;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      .wrap { max-width: 820px; margin: 0 auto; padding: 32px 20px 80px; }
      header h1 { font-size: 22px; margin: 0 0 4px; }
      header p { margin: 0; color: var(--muted); font-size: 13px; }
      header code { background: var(--panel-2); padding: 2px 6px; border-radius: 5px; font-size: 12px; }

      .searchbar { display: flex; gap: 8px; margin: 22px 0 10px; }
      input[type="text"] {
        flex: 1; padding: 12px 14px; border-radius: 10px;
        border: 1px solid var(--border); background: var(--panel); color: var(--text);
        font-size: 15px; outline: none;
      }
      input[type="text"]:focus { border-color: var(--accent); }
      button {
        padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer;
        background: var(--accent-2); color: white; font-size: 15px; font-weight: 600;
      }
      button:disabled { opacity: .55; cursor: default; }

      .options { display: flex; gap: 18px; align-items: center; color: var(--muted); font-size: 13px; }
      .options label { display: flex; gap: 6px; align-items: center; cursor: pointer; user-select: none; }

      .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0 4px; }
      .chip {
        background: var(--panel); border: 1px solid var(--border); color: var(--muted);
        padding: 6px 12px; border-radius: 999px; font-size: 13px; cursor: pointer;
      }
      .chip:hover { color: var(--text); border-color: var(--accent); }

      .status { margin: 18px 0; font-size: 13px; color: var(--muted); min-height: 18px; }
      .status.loading::before { content: "● "; color: var(--accent); }
      .status.done::before { content: "✓ "; color: var(--ok); }
      .status.error { color: var(--err); }

      .card {
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 12px; padding: 18px; margin: 14px 0;
      }
      .card h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 0 0 12px; }
      #answer { white-space: pre-wrap; word-wrap: break-word; font-size: 15px; min-height: 1em; }
      #answer:empty::after { content: "The AI answer will stream here…"; color: var(--muted); }

      .result { padding: 12px 0; border-top: 1px solid var(--border); }
      .result:first-of-type { border-top: none; padding-top: 0; }
      .result a { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 15px; }
      .result a:hover { text-decoration: underline; }
      .result .snippet { color: var(--muted); font-size: 13px; margin-top: 4px; }
      .result .url { color: #5b677a; font-size: 12px; margin-top: 3px; word-break: break-all; }

      .more a { display: block; color: var(--accent); text-decoration: none; font-size: 14px; padding: 5px 0; }
      .more a:hover { text-decoration: underline; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>DiscovAI Search · agendo test console</h1>
        <p>Streams from <code>POST /discovai/chat</code> (SSE) on this same backend.</p>
      </header>

      <div class="searchbar">
        <input id="query" type="text" placeholder="Ask something…" autocomplete="off" />
        <button id="go">Search</button>
      </div>

      <div class="options">
        <label><input type="checkbox" id="refreshCache" /> Bypass cache</label>
        <label><input type="checkbox" id="debug" /> Debug logs (server)</label>
      </div>

      <div class="chips" id="chips">
        <span class="chip">How do I reset my password?</span>
        <span class="chip">How does billing work?</span>
        <span class="chip">What payment methods are accepted?</span>
      </div>

      <div class="status" id="status"></div>

      <div class="card">
        <h2>AI answer</h2>
        <div id="answer"></div>
      </div>

      <div class="card hidden" id="resultsCard">
        <h2>Search results</h2>
        <div id="results"></div>
      </div>

      <div class="card hidden" id="moreCard">
        <h2>More results</h2>
        <div class="more" id="more"></div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const queryEl = $("query");
      const goEl = $("go");

      // This page is served at the route's mount root (e.g. /discovai), so derive
      // the chat endpoint from the current path. A bare relative "./chat" would
      // resolve against the parent ("/chat") when there's no trailing slash -> 404.
      const CHAT_URL = window.location.pathname.replace(/\/+$/, "") + "/chat";

      function escapeHtml(s) {
        return String(s ?? "")
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      function setStatus(text, cls) {
        const el = $("status");
        el.textContent = text;
        el.className = "status" + (cls ? " " + cls : "");
      }

      function resetUI() {
        $("answer").textContent = "";
        $("results").innerHTML = "";
        $("more").innerHTML = "";
        $("resultsCard").classList.add("hidden");
        $("moreCard").classList.add("hidden");
      }

      function appendAnswer(text) {
        $("answer").textContent += text;
      }

      function renderResults(results) {
        if (!results.length) return;
        $("resultsCard").classList.remove("hidden");
        $("results").innerHTML = results
          .map(
            (r) => `
            <div class="result">
              <a href="${escapeHtml(r.url)}" target="_blank" rel="noopener">${escapeHtml(r.title)}</a>
              <div class="snippet">${escapeHtml((r.content || "").trim())}</div>
              <div class="url">${escapeHtml(r.url)}</div>
            </div>`
          )
          .join("");
      }

      function renderMore(items) {
        if (!items.length) return;
        $("moreCard").classList.remove("hidden");
        $("more").innerHTML = items
          .map(
            (m) =>
              `<a href="${escapeHtml(m.url)}" target="_blank" rel="noopener">${escapeHtml(m.title)}</a>`
          )
          .join("");
      }

      function handleFrame(frame) {
        const line = frame.trim();
        if (!line.startsWith("data:")) return;
        const jsonStr = line.replace(/^data:\s*/, "");
        let payload;
        try {
          payload = JSON.parse(jsonStr);
        } catch {
          return;
        }
        const { event, data = {} } = payload;
        switch (event) {
          case "begin-stream":
            setStatus("Searching…", "loading");
            break;
          case "search-results":
            renderResults(data.results || []);
            setStatus("Generating answer…", "loading");
            break;
          case "text-chunk":
            appendAnswer(data.text || "");
            break;
          case "more-results":
            renderMore(data.more_results || []);
            break;
          case "final-response":
            // full message also available as data.message
            break;
          case "stream-end":
            setStatus("Done", "done");
            break;
          case "error":
            setStatus("Error: " + (data.detail || "unknown"), "error");
            break;
        }
      }

      async function runSearch() {
        const query = queryEl.value.trim();
        if (!query) return;
        resetUI();
        goEl.disabled = true;
        setStatus("Connecting…", "loading");

        try {
          const resp = await fetch(CHAT_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              query,
              refreshCache: $("refreshCache").checked,
              debug: $("debug").checked,
            }),
          });

          if (!resp.ok || !resp.body) {
            throw new Error("request failed (" + resp.status + ")");
          }

          const reader = resp.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            let idx;
            while ((idx = buffer.indexOf("\n\n")) !== -1) {
              const frame = buffer.slice(0, idx);
              buffer = buffer.slice(idx + 2);
              handleFrame(frame);
            }
          }
          if (buffer.trim()) handleFrame(buffer);
        } catch (err) {
          setStatus("Error: " + err.message, "error");
        } finally {
          goEl.disabled = false;
        }
      }

      goEl.addEventListener("click", runSearch);
      queryEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") runSearch();
      });
      $("chips").addEventListener("click", (e) => {
        if (e.target.classList.contains("chip")) {
          queryEl.value = e.target.textContent;
          runSearch();
        }
      });
      queryEl.focus();
    </script>
  </body>
</html>
